name: Daily IPTV Automated Sync

on:
  workflow_dispatch: # 允许手动点击运行
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上 6 点自动运行 (UTC 时间 22:00)

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4 requests

    - name: Run IPTV Script
      run: |
        python main.py # 假设你的 Python 文件名是 main.py，请根据实际情况修改

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add live.m3u
        # 只有当 live.m3u 有变动时才提交，防止报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update IPTV sources" && git push)
