name: Build and Run IPTV Scraper

on:
  schedule:
    - cron: '0 0,12 * * *' # 每天按需运行，请保留您原有的时间设置
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 升级到 v4，消除 Node.js 20 警告
    - name: Checkout repository
      uses: actions/checkout@v4

    # 升级到 v5，消除 Node.js 20 警告
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp requests beautifulsoup4

    - name: Run Scraper Script
      run: python main.py # ⚠️ 注意：如果您的 Python 文件不叫 main.py，请将这里修改为您的实际文件名

    - name: Commit and Push M3U
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add live.m3u
        git commit -m "Auto-update IPTV sources" || exit 0
        git push
