name: Daily IPTV Automated Sync

on:
  schedule:
    # 国际标准时间 00:00 对应北京时间早上 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须显式赋予写入权限，否则排序后的 m3u 无法 push 回仓库

    steps:
    - name: Checkout Private Repo
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Setup FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3
      # 优化：使用官方 Action 安装 FFmpeg，比 apt-get 速度快很多，且不易受网络波动影响

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 优化：增加依赖缓存，加快后续运行速度

    - name: Install Python Dependencies
      run: |
        pip install aiohttp requests beautifulsoup4

    - name: Run IPTV Pipeline Script (抓取与排序)
      env:
        TG_API_ID: ${{ secrets.TG_API_ID }}
        TG_API_HASH: ${{ secrets.TG_API_HASH }}
      run: |
        python update_iptv.py
        # 你的排序逻辑已经在 update_iptv.py 中执行，这里会自动覆盖生成排序后的 live.m3u

    - name: Commit and Push to Private Repo
      run: |
        git config --global user.name "Actions-Bot"
        git config --global user.email "actions@github.com"
        git add live.m3u
        # 优化：强制使用亚洲/上海时区，解决 GitHub 默认使用 UTC 导致时间显示为 00:00 的问题
        git diff --quiet && git diff --staged --quiet || (git commit -m "☀️ Daily Auto Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" && git push)
